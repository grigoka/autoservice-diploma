services:
  db:
    image: postgres:16
    container_name: autoservice_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autoservice
      POSTGRES_USER: autoservice
      POSTGRES_PASSWORD: autoservice
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: autoservice_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  db-data:
