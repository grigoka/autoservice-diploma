spring:
  application:
    name: dip-project
  datasource:
    url: jdbc:postgresql://localhost:5432/autoservice
    username: autoservice
    password: autoservice
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/autoservice
    user: autoservice
    password: autoservice

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your.email@example.com}
    password: ${MAIL_PASSWORD:app-password-here}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:your.email@example.com}

jwt:
  secret: ${JWT_SECRET:default-super-long-jwt-secret-change-me-please-0123456789abcdef0123456789abcdef}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:true}
  vat:
    default-rate: ${VAT_DEFAULT_RATE:0.21}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    properties:
      hibernate:
        show_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE